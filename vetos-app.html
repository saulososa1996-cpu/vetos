<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c0a">
<title>VetOS · Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#080c0a; --deep:#0d1410; --card:#111a14; --card2:#162019;
  --border:#1e3024; --border2:#264030;
  --emerald:#2ecc71; --emerald-l:#4eda87; --emerald-d:#1fa355;
  --emerald-dim:rgba(46,204,113,.1);
  --rose:#e05c5c; --gold:#c8a96e; --blue:#5c9de0;
  --text:#e8f2eb; --muted:#6b8c73; --soft:#b0ccb8;
  --sidebar:260px;
  --fs-xs:12px; --fs-sm:13px; --fs-base:15px; --fs-md:17px;
  --fs-lg:20px; --fs-xl:26px; --fs-2xl:34px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  font-family:'DM Mono',monospace;
  background:var(--noir);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  font-size:var(--fs-base);
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--deep);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;background:var(--noir);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:24px;z-index:9999;
}
.loader-logo{
  font-family:'Syne',sans-serif;font-size:48px;font-weight:800;
  opacity:0;animation:fadeUp .6s .2s forwards;
}
.loader-logo em{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:var(--emerald);font-weight:400;
}
.loader-bar{
  width:120px;height:2px;background:var(--border);
  border-radius:2px;overflow:hidden;
  opacity:0;animation:fadeUp .6s .4s forwards;
}
.loader-bar-fill{
  height:100%;background:var(--emerald);
  animation:load 1.2s ease forwards;
}
@keyframes load{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGIN ── */
#loginScreen{
  position:fixed;inset:0;background:var(--noir);
  display:none;align-items:center;justify-content:center;
  z-index:1000;
}
.login-bg{
  position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;opacity:.2;
}
.login-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(46,204,113,.06) 0%,transparent 70%);
}
.login-box{
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;padding:52px 44px;
  width:100%;max-width:420px;
  position:relative;z-index:2;
  animation:fadeUp .5s both;
}
.login-logo{
  font-family:'Syne',sans-serif;font-size:36px;font-weight:800;
  text-align:center;margin-bottom:8px;
}
.login-logo em{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:var(--emerald);font-weight:400;
}
.login-sub{
  text-align:center;font-size:13px;color:var(--muted);
  margin-bottom:36px;
}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block;}
.form-input{
  width:100%;background:var(--deep);border:1px solid var(--border2);
  border-radius:6px;padding:14px 16px;
  color:var(--text);font-size:15px;font-family:'DM Mono',monospace;
  outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--emerald);}
.form-input::placeholder{color:var(--muted);}
.btn-login{
  width:100%;background:var(--emerald);color:var(--noir);
  border:none;border-radius:6px;padding:15px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;text-transform:uppercase;
  transition:all .2s;margin-top:8px;
}
.btn-login:hover{background:var(--emerald-l);}
.login-err{
  background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);
  border-radius:6px;padding:10px 14px;
  font-size:13px;color:#e05c5c;margin-top:12px;
  display:none;
}

/* ── APP SHELL ── */
#appShell{
  display:none;height:100vh;
  flex-direction:row;
  animation:fadeIn .4s;
}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--deep);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;
  overflow-y:auto;
  transition:transform .3s;
}
.sidebar-logo{
  padding:28px 24px 20px;
  font-family:'Syne',sans-serif;font-size:24px;font-weight:800;
  border-bottom:1px solid var(--border);
}
.sidebar-logo em{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:var(--emerald);font-weight:400;
}
.sidebar-clinic{
  padding:16px 24px;
  border-bottom:1px solid var(--border);
}
.clinic-name{font-size:13px;font-weight:600;color:var(--text);}
.clinic-plan{
  font-size:10px;color:var(--emerald);
  background:var(--emerald-dim);
  border:1px solid rgba(46,204,113,.2);
  padding:2px 8px;border-radius:2px;
  display:inline-block;margin-top:4px;
  text-transform:uppercase;letter-spacing:.5px;
}
.nav-section{padding:20px 16px 8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-radius:6px;margin:2px 8px;
  cursor:pointer;transition:all .2s;
  font-size:13px;color:var(--soft);
  text-decoration:none;
}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{
  background:var(--emerald-dim);color:var(--emerald);
  border:1px solid rgba(46,204,113,.15);
}
.nav-icon{font-size:16px;min-width:20px;text-align:center;}
.sidebar-bottom{margin-top:auto;padding:16px 8px;border-top:1px solid var(--border);}
.btn-logout{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;border-radius:6px;
  cursor:pointer;font-size:13px;color:var(--muted);
  transition:all .2s;width:100%;
  background:none;border:none;font-family:'DM Mono',monospace;
}
.btn-logout:hover{color:var(--rose);background:rgba(224,92,92,.08);}

/* ── MAIN ── */
.main{
  flex:1;overflow-y:auto;
  background:var(--noir);
}
.topbar{
  position:sticky;top:0;
  background:rgba(8,12,10,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:50;
}
.topbar-title{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:700;
}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-date{font-size:12px;color:var(--muted);}
.topbar-menu{
  display:none;background:none;border:none;
  color:var(--text);cursor:pointer;font-size:20px;padding:4px;
}
.content{padding:32px;animation:slideIn .4s both;}

/* ── STATS GRID ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  margin-bottom:28px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:22px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat-card:hover{border-color:var(--border2);}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.stat-card.c-emerald::before{background:var(--emerald);}
.stat-card.c-gold::before{background:var(--gold);}
.stat-card.c-blue::before{background:var(--blue);}
.stat-card.c-rose::before{background:var(--rose);}
.stat-icon{font-size:22px;margin-bottom:12px;}
.stat-val{
  font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
  letter-spacing:-1px;margin-bottom:4px;
}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.stat-delta{font-size:11px;margin-top:6px;}
.stat-delta.up{color:var(--emerald);}
.stat-delta.down{color:var(--rose);}

/* ── GRIDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
.panel{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
}
.panel-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-title{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
}
.panel-body{padding:20px;}

/* ── TABLE ── */
.table{width:100%;border-collapse:collapse;}
.table th{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;padding:10px 16px;
  border-bottom:1px solid var(--border);text-align:left;
}
.table td{
  padding:13px 16px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--soft);
}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:var(--deep);}
.table-name{color:var(--text);font-weight:500;}

/* ── BADGES ── */
.badge{
  font-size:10px;padding:3px 10px;border-radius:2px;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  display:inline-block;
}
.badge-ok{background:rgba(46,204,113,.12);color:var(--emerald);}
.badge-warn{background:rgba(200,169,110,.12);color:var(--gold);}
.badge-err{background:rgba(224,92,92,.12);color:var(--rose);}
.badge-blue{background:rgba(92,157,224,.12);color:var(--blue);}
.badge-muted{background:var(--border);color:var(--muted);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:6px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;
  text-transform:uppercase;letter-spacing:.5px;
}
.btn-sm{padding:7px 14px;font-size:11px;}
.btn-primary{background:var(--emerald);color:var(--noir);}
.btn-primary:hover{background:var(--emerald-l);}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--soft);}
.btn-ghost:hover{border-color:var(--emerald);color:var(--emerald);}
.btn-danger{background:none;border:1px solid rgba(224,92,92,.3);color:var(--rose);}
.btn-danger:hover{background:rgba(224,92,92,.1);}
.btn-icon{padding:8px;border-radius:6px;background:none;border:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all .2s;font-size:14px;}
.btn-icon:hover{border-color:var(--emerald);color:var(--emerald);}

/* ── AGENDA ── */
.agenda-grid{
  display:grid;gap:0;
}
.agenda-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;border-bottom:1px solid var(--border);
  transition:background .15s;cursor:pointer;
}
.agenda-row:hover{background:var(--deep);}
.agenda-row:last-child{border-bottom:none;}
.agenda-hour{
  font-size:13px;color:var(--emerald);
  min-width:44px;font-weight:500;
}
.agenda-pet-wrap{flex:1;}
.agenda-pet-name{font-size:14px;font-weight:600;color:var(--text);}
.agenda-pet-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.agenda-actions{display:flex;gap:6px;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  z-index:500;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:14px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  animation:slideIn .3s both;
}
.modal-header{
  padding:24px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:1;
}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.modal-close{
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:20px;transition:color .2s;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;
}
.modal-close:hover{color:var(--text);background:var(--border);}
.modal-body{padding:28px;}
.modal-footer{
  padding:20px 28px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
}

/* ── FORM ── */
.field{margin-bottom:18px;}
.field-label{
  font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px;display:block;
}
.field-input,.field-select,.field-textarea{
  width:100%;background:var(--deep);
  border:1px solid var(--border2);border-radius:6px;
  padding:12px 14px;color:var(--text);
  font-size:14px;font-family:'DM Mono',monospace;
  outline:none;transition:border-color .2s;
}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--emerald);}
.field-select{cursor:pointer;}
.field-select option{background:var(--card);}
.field-textarea{resize:vertical;min-height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── PET CARD ── */
.pet-card{
  background:var(--deep);border:1px solid var(--border);
  border-radius:8px;padding:16px;
  display:flex;align-items:center;gap:14px;
  margin-bottom:10px;cursor:pointer;
  transition:border-color .2s;
}
.pet-card:hover{border-color:var(--border2);}
.pet-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--emerald-dim);border:1px solid rgba(46,204,113,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;min-width:44px;
}
.pet-info{flex:1;}
.pet-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.pet-meta{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── VACUNA ROW ── */
.vac-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.vac-row:last-child{border-bottom:none;}
.vac-name{font-size:13px;color:var(--text);}
.vac-date{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── CAJA ── */
.caja-total{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin-bottom:20px;
}
.caja-card{
  background:var(--deep);border:1px solid var(--border);
  border-radius:8px;padding:16px;
}
.caja-val{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-1px;
}
.caja-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.empty-text{font-size:14px;color:var(--muted);}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:200;
    transform:translateX(-100%);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    z-index:199;display:none;
  }
  .sidebar-overlay.open{display:block;}
  .topbar-menu{display:flex;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .content{padding:16px;}
  .topbar{padding:14px 16px;}
  .field-row{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-val{font-size:22px;}
  .caja-total{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">Vet<em>OS</em></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-logo">Vet<em>OS</em></div>
    <div class="login-sub">Sistema de Gestión Veterinaria</div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="lu" type="text" placeholder="veterinaria@clinica.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="lp" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">INGRESAR</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- APP -->
<div id="appShell" style="display:none;flex-direction:row;">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Vet<em>OS</em></div>
    <div class="sidebar-clinic">
      <div class="clinic-name" id="clinicName">Clínica Veterinaria</div>
      <div class="clinic-plan">Plan Pro</div>
    </div>
    <div class="nav-section">Principal</div>
    <a class="nav-item active" onclick="goTo('dashboard')" href="#">
      <span class="nav-icon">📊</span>Dashboard
    </a>
    <a class="nav-item" onclick="goTo('agenda')" href="#">
      <span class="nav-icon">📅</span>Agenda
    </a>
    <a class="nav-item" onclick="goTo('mascotas')" href="#">
      <span class="nav-icon">🐾</span>Mascotas
    </a>
    <a class="nav-item" onclick="goTo('clientes')" href="#">
      <span class="nav-icon">👥</span>Clientes
    </a>
    <div class="nav-section">Gestión</div>
    <a class="nav-item" onclick="goTo('vacunas')" href="#">
      <span class="nav-icon">💉</span>Vacunas
    </a>
    <a class="nav-item" onclick="goTo('caja')" href="#">
      <span class="nav-icon">💰</span>Caja
    </a>
    <a class="nav-item" onclick="goTo('inventario')" href="#">
      <span class="nav-icon">📦</span>Inventario
    </a>
    <div class="nav-section">Sistema</div>
    <a class="nav-item" onclick="goTo('config')" href="#">
      <span class="nav-icon">⚙️</span>Configuración
    </a>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="doLogout()">
        <span>↩</span> Cerrar sesión
      </button>
    </div>
  </aside>

  <div class="main" id="mainArea">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="topbar-menu" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbarDate"></div>
        <button class="btn btn-primary btn-sm" id="topbarBtn" onclick="topbarAction()">+ Nuevo turno</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalTurno">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTurnoTitle">Nuevo Turno</div>
      <button class="modal-close" onclick="closeModal('modalTurno')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label class="field-label">Fecha</label>
          <input class="field-input" id="tFecha" type="date">
        </div>
        <div class="field">
          <label class="field-label">Hora</label>
          <input class="field-input" id="tHora" type="time">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Mascota</label>
        <select class="field-select" id="tMascota">
          <option value="">Seleccionar mascota...</option>
        </select>
      </div>
      <div class="field">

// ─── INIT ───
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').style.opacity = '0';
    document.getElementById('loader').style.transition = 'opacity .4s';
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }, 400);
  }, 1400);
  const d = new Date();
  document.getElementById('topbarDate').textContent =
    d.toLocaleDateString('es-PY', {weekday:'long', day:'numeric', month:'long'});
});

// ─── LOGIN ───
function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  if (!u || !p) { showLoginErr('Completá usuario y contraseña'); return; }
  btn.textContent = 'INGRESANDO...'; btn.disabled = true;
  setTimeout(() => {
    // Demo: cualquier usuario/contraseña
    btn.textContent = 'INGRESAR'; btn.disabled = false;
    err.style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('clinicName').textContent = APP.config.clinica;
    goTo('dashboard');
    try { document.documentElement.requestFullscreen?.(); } catch(e){}
  }, 800);
}
function showLoginErr(msg) {
  const err = document.getElementById('loginErr');
  err.textContent = msg; err.style.display = 'block';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display === 'flex') doLogin();
});

function doLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lp').value = '';
  try { document.exitFullscreen?.(); } catch(e){}
}

// ─── NAVIGATION ───
function goTo(sec) {
  APP.seccion = sec;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(sec)) el.classList.add('active');
  });
  const titles = {
    dashboard:'Dashboard', agenda:'Agenda', mascotas:'Mascotas',
    clientes:'Clientes', vacunas:'Vacunas', caja:'Caja',
    inventario:'Inventario', config:'Configuración'
  };
  const btns = {
    dashboard:'+ Nuevo turno', agenda:'+ Nuevo turno', mascotas:'+ Nueva mascota',
    clientes:'+ Nuevo cliente', vacunas:'+ Registrar vacuna',
    caja:'+ Movimiento', inventario:'+ Producto', config:''
  };
  document.getElementById('topbarTitle').textContent = titles[sec] || sec;
  const tb = document.getElementById('topbarBtn');
  tb.textContent = btns[sec] || '';
  tb.style.display = btns[sec] ? 'inline-flex' : 'none';
  const renders = {
    dashboard: renderDashboard, agenda: renderAgenda,
    mascotas: renderMascotas, clientes: renderClientes,
    vacunas: renderVacunas, caja: renderCaja,
    inventario: renderInventario, config: renderConfig
  };
  const content = document.getElementById('content');
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = 'slideIn .3s both';
  (renders[sec] || (() => { content.innerHTML = '<div class="empty"><div class="empty-icon">🚧</div><div class="empty-text">En construcción</div></div>'; }))();
}

function topbarAction() {
  const actions = {
    dashboard: () => openModal('modalTurno'),
    agenda: () => openModal('modalTurno'),
    mascotas: () => openModal('modalMascota'),
    clientes: () => openModal('modalCliente'),
    vacunas: () => openModal('modalVacuna'),
    caja: () => openModal('modalCaja'),
    inventario: () => openModal('modalInventario'),
  };
  (actions[APP.seccion] || (() => {}))();
}

// ─── SIDEBAR ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ─── MODALS ───
function openModal(id) {
  // Populate selects
  const mSel = document.getElementById('tMascota');
  const vSel = document.getElementById('vMascota');
  const dSel = document.getElementById('mDueno');
  const cSel = document.getElementById('cajaCliente');
  if (mSel) { mSel.innerHTML = '<option value="">Seleccionar mascota...</option>'; APP.mascotas.forEach(m => { mSel.innerHTML += `<option value="${m.id}">${m.especie} ${m.nombre}</option>`; }); }
  if (vSel) { vSel.innerHTML = ''; APP.mascotas.forEach(m => { vSel.innerHTML += `<option value="${m.id}">${m.especie} ${m.nombre}</option>`; }); }
  if (dSel) { dSel.innerHTML = '<option value="">Seleccionar dueño...</option>'; APP.clientes.forEach(c => { dSel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`; }); }
  if (cSel) { cSel.innerHTML = '<option value="">Sin especificar</option>'; APP.clientes.forEach(c => { cSel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`; }); }
  // Set dates
  const fd = document.getElementById('tFecha'); if(fd) fd.value = hoy;
  const vfd = document.getElementById('vFecha'); if(vfd) vfd.value = hoy;
  const cafd = document.getElementById('cajaFecha'); if(cafd) cafd.value = hoy;
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('open'); });
});

// ─── HELPERS ───
function getMascota(id) { return APP.mascotas.find(m=>m.id===id)||{}; }
function getCliente(id) { return APP.clientes.find(c=>c.id===id)||{}; }
function fmt(n) { return new Intl.NumberFormat('es-PY').format(n); }
function diasRestantes(fecha) {
  const d = new Date(fecha) - new Date();
  return Math.ceil(d/86400000);
}
function uid() { return '_'+Math.random().toString(36).slice(2,8); }

function vacunaBadge(proxima) {
  const dias = diasRestantes(proxima);
  if (dias < 0) return '<span class="badge badge-err">Vencida</span>';
  if (dias <= 14) return `<span class="badge badge-warn">⚠ ${dias} días</span>`;
  return '<span class="badge badge-ok">Al día</span>';
}

// ─── DASHBOARD ───
function renderDashboard() {
  const turnosHoy = APP.turno.filter(t => t.fecha === hoy);
  const ingresosHoy = APP.caja.filter(m => m.fecha === hoy && m.tipo === 'ingreso').reduce((a,b) => a+b.monto, 0);
  const mascotasTotal = APP.mascotas.length;
  const vacVencidas = APP.vacunas.filter(v => diasRestantes(v.proxima) <= 14).length;
  const stockBajo = APP.inventario.filter(i => i.stock <= i.min).length;

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card c-emerald">
        <div class="stat-icon">📅</div>
        <div class="stat-val">${turnosHoy.length}</div>
        <div class="stat-label">Turnos hoy</div>
        <div class="stat-delta up">▲ Agenda activa</div>
      </div>
      <div class="stat-card c-gold">
        <div class="stat-icon">💰</div>
        <div class="stat-val">₲ ${fmt(ingresosHoy)}</div>
        <div class="stat-label">Ingresos hoy</div>
        <div class="stat-delta up">▲ Del día</div>
      </div>
      <div class="stat-card c-blue">
        <div class="stat-icon">🐾</div>
        <div class="stat-val">${mascotasTotal}</div>
        <div class="stat-label">Mascotas</div>
        <div class="stat-delta up">Total registradas</div>
      </div>
      <div class="stat-card c-rose">
        <div class="stat-icon">💉</div>
        <div class="stat-val">${vacVencidas}</div>
        <div class="stat-label">Vacunas urgentes</div>
        <div class="stat-delta ${vacVencidas>0?'down':'up'}">${vacVencidas>0?'⚠ Atención requerida':'✓ Sin urgencias'}</div>
      </div>
    </div>

    <div class="grid-3">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📅 Agenda de hoy</div>
          <button class="btn btn-ghost btn-sm" onclick="goTo('agenda')">Ver todo →</button>
        </div>
        <div>
          ${turnosHoy.length === 0 ? '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No hay turnos hoy</div></div>' :
            turnosHoy.map(t => {
              const m = getMascota(t.mascota);
              const c = getCliente(m.dueno);
              return `
              <div class="agenda-row" onclick="goTo('agenda')">

  APP.turno = APP.turno.filter(t=>t.id!==id);
  goTo(APP.seccion);
}
function eliminarCliente(id) {
  if (!confirm('¿Eliminar este cliente?')) return;
  APP.clientes = APP.clientes.filter(c=>c.id!==id);
  goTo(APP.seccion);
}
function eliminarMovimiento(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  APP.caja = APP.caja.filter(m=>m.id!==id);
  goTo(APP.seccion);
}
function eliminarProducto(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  APP.inventario = APP.inventario.filter(i=>i.id!==id);
  goTo(APP.seccion);
}

// ─── ESTADO TURNO ───
function cambiarEstado(id) {
  const estados = ['Confirmado','En espera','En consulta','Completado','Cancelado'];
  const t = APP.turno.find(t=>t.id===id);
  if (!t) return;
  const idx = estados.indexOf(t.estado);
  t.estado = estados[(idx+1) % estados.length];
  goTo(APP.seccion);
}

// ─── WHATSAPP ───
function whatsapp(tel, mascota) {
  const num = tel.replace(/\D/g,'');
  const msg = mascota ? `Hola! Le contactamos de la clínica por el turno de ${mascota}.` : 'Hola! Le contactamos de la clínica veterinaria.';
  window.open(`https://wa.me/595${num}?text=${encodeURIComponent(msg)}`, '_blank');
}
function whatsappVacuna(tel, mascota, vacuna, fecha) {
  const num = tel.replace(/\D/g,'');
  const msg = `Hola! Le recordamos que ${mascota} tiene pendiente la vacuna *${vacuna}*. La próxima dosis vence el ${fecha}. Comuníquese para coordinar el turno. 🐾`;
  window.open(`https://wa.me/595${num}?text=${encodeURIComponent(msg)}`, '_blank');
}
